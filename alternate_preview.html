<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renz Filart | Personal Portfolio</title>
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Framer Motion CDN -->
    <script src="https://unpkg.com/framer-motion@11.0.8/dist/framer-motion.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#0a0a0a',
                        primary: '#3b82f6',
                        secondary: '#ef4444',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; margin: 0; overflow-x: hidden; }
        html { scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .text-gradient { background: linear-gradient(to right, #3b82f6, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { motion, AnimatePresence } = window.Motion;

        const Navbar = () => {
            const [scrolled, setScrolled] = React.useState(false);
            const [isOpen, setIsOpen] = React.useState(false);

            React.useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const links = [
                { name: 'About', href: '#about' },
                { name: 'Socials', href: '#socials' },
                { name: 'Content', href: '#portfolio' },
                { name: 'Skills', href: '#skills' },
            ];

            return (
                <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'py-4 glass' : 'py-6 bg-transparent'}`}>
                    <div className="container mx-auto px-6 flex justify-between items-center">
                        <div className="flex items-center space-x-2">
                            <i data-lucide="bike" className="w-8 h-8 text-blue-500"></i>
                            <span className="text-xl font-bold tracking-tighter uppercase">Renz Filart</span>
                        </div>
                        <div className="hidden md:flex space-x-8 items-center">
                            {links.map(link => (
                                <a key={link.name} href={link.href} className="text-sm font-medium text-gray-300 hover:text-blue-500 transition-colors uppercase tracking-widest">{link.name}</a>
                            ))}
                            <a href="#contact" className="px-5 py-2 bg-blue-600 rounded-full text-sm font-semibold hover:bg-blue-700 transition-colors shadow-lg shadow-blue-600/20">Let's Talk</a>
                        </div>
                        <button className="md:hidden" onClick={() => setIsOpen(!isOpen)}>
                            <i data-lucide={isOpen ? 'x' : 'menu'} className="w-6 h-6"></i>
                        </button>
                    </div>
                </nav>
            );
        };

        const Hero = () => (
            <section className="relative h-screen w-full flex items-center justify-center overflow-hidden">
                <div className="absolute inset-0 z-0">
                    <img src="./src/assets/hero-bg.jpg" className="w-full h-full object-cover opacity-60 scale-105" alt="Hero background" />
                    <div className="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] via-transparent to-transparent" />
                </div>
                <div className="container mx-auto px-6 relative z-10 text-center">
                    <motion.div initial={{ opacity: 0, y: 30 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 1 }}>
                        <span className="px-4 py-1.5 rounded-full border border-blue-500/30 bg-blue-500/10 text-blue-400 text-[10px] font-bold tracking-[0.3em] uppercase mb-8 inline-block">Welcome to the Ride</span>
                        <h1 className="text-6xl md:text-9xl font-black mb-8 tracking-tighter leading-none italic">I AM <span className="text-gradient">RENZ</span></h1>
                        <p className="text-lg md:text-2xl text-gray-400 mb-12 max-w-3xl mx-auto font-light tracking-wide">
                            Motovlogger <span className="mx-2 text-blue-500 font-bold">|</span> Content Creator <span className="mx-2 text-blue-500 font-bold">|</span> Tech Enthusiast
                        </p>
                        <div className="flex flex-col md:flex-row items-center justify-center gap-6">
                            <motion.a whileHover={{ scale: 1.05 }} href="#portfolio" className="px-10 py-5 bg-blue-600 rounded-full font-bold flex items-center space-x-3 hover:bg-blue-700 transition-all shadow-xl shadow-blue-600/30">
                                <i data-lucide="play" className="w-5 h-5 fill-current"></i>
                                <span>VIEW MY CONTENT</span>
                            </motion.a>
                            <motion.a whileHover={{ scale: 1.05 }} href="#socials" className="px-10 py-5 glass rounded-full font-bold border border-white/10 hover:bg-white/10 transition-all">
                                JOIN THE COMMUNITY
                            </motion.a>
                        </div>
                    </motion.div>
                </div>
                <div className="absolute bottom-10 left-1/2 -ms-4 animate-bounce text-gray-500">
                    <i data-lucide="chevron-down" className="w-8 h-8"></i>
                </div>
            </section>
        );

        const About = () => (
            <section id="about" className="py-32 bg-[#0a0a0a]">
                <div className="container mx-auto px-6">
                    <div className="grid md:grid-cols-2 gap-20 items-center">
                        <motion.div initial={{ opacity: 0, x: -50 }} whileInView={{ opacity: 1, x: 0 }} viewport={{ once: true }} className="relative group">
                            <div className="aspect-[4/5] glass rounded-[3rem] overflow-hidden">
                                <img src="./src/assets/about-me.jpg" className="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700 scale-105 group-hover:scale-100" />
                                <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-60"></div>
                                <div className="absolute bottom-10 left-10 text-left">
                                    <p className="text-5xl font-black text-blue-500">50K+</p>
                                    <p className="text-xs uppercase tracking-[0.4em] text-gray-400 font-bold">Total Views</p>
                                </div>
                            </div>
                        </motion.div>
                        <motion.div initial={{ opacity: 0, x: 50 }} whileInView={{ opacity: 1, x: 0 }} viewport={{ once: true }}>
                            <h2 className="text-5xl font-black mb-10 italic uppercase tracking-tighter">Fueling Passion <br/> <span className="text-blue-500">Behind the Lens</span></h2>
                            <div className="space-y-6 text-gray-400 text-lg leading-relaxed font-light">
                                <p>Hey, I'm Renz! Better known as <span className="text-white font-semibold">Renz Filart</span>. What started as a simple love for motorcycles has evolved into a full-blown journey of storytelling and content creation.</p>
                                <p>My channel is a mix of high-octane motovlogs, tech deep-dives, and behind-the-scenes of what it takes to create engaging digital content.</p>
                            </div>
                        </motion.div>
                    </div>
                </div>
            </section>
        );

        const Socials = () => {
            const list = [
                { name: 'YouTube', handle: '@rdftrenzo', icon: 'youtube', color: 'hover:bg-red-600', url: 'https://www.youtube.com/@rdftrenzo' },
                { name: 'TikTok', handle: '@rdft.moto', icon: 'music', color: 'hover:bg-cyan-500', url: '#' },
                { name: 'Instagram', handle: '@rdftrenzo', icon: 'instagram', color: 'hover:bg-pink-600', url: '#' },
            ];
            return (
                <section id="socials" className="py-32 bg-[#0d0d0d]">
                    <div className="container mx-auto px-6">
                        <div className="text-center mb-20">
                            <h2 className="text-4xl font-black mb-4 uppercase tracking-tighter italic">Connect With Me</h2>
                            <p className="text-gray-500 uppercase tracking-widest text-sm">Join the community on social media</p>
                        </div>
                        <div className="grid md:grid-cols-3 gap-8">
                            {list.map((s, i) => (
                                <motion.a key={i} href={s.url} target="_blank" whileHover={{ y: -10 }} className={`p-10 rounded-3xl glass group transition-all ${s.color}`}>
                                    <div className="bg-white/5 w-16 h-16 rounded-2xl flex items-center justify-center mb-8 border border-white/5 group-hover:bg-white/20">
                                        <i data-lucide={s.icon} className="w-8 h-8"></i>
                                    </div>
                                    <h3 className="text-2xl font-bold mb-1">{s.name}</h3>
                                    <p className="text-blue-500 font-mono text-sm group-hover:text-white">{s.handle}</p>
                                </motion.a>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Portfolio = () => {
            const content = [
                { title: 'POV ng isang angkas', category: 'Motovlog', id: 'B90jiHTKt9k' },
                { title: "My parents' date in Caliraya", category: 'Vlog', id: 'KV_ybQblEec' },
                { title: 'Marilaque Uphill Duo | ADV 150 | Aerox SP | Insta 360 X5 POV', category: 'Ride', id: 'pMjZ_kwgC7Q' },
                { title: 'OJT - Side Quest sa LB - Birthday ni GF', category: 'Vlog', id: '5O4cwTCooDE' },
            ];
            return (
                <section id="portfolio" className="py-32 bg-[#0a0a0a]">
                    <div className="container mx-auto px-6">
                        <div className="flex justify-between items-end mb-20">
                            <h2 className="text-4xl font-black uppercase tracking-tighter italic">Latest Content</h2>
                            <a href="https://www.youtube.com/@rdftrenzo" target="_blank" className="text-blue-500 font-bold hover:underline">VIEW ALL</a>
                        </div>
                        <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-8">
                            {content.map((item, i) => (
                                <motion.a key={i} href={`https://www.youtube.com/watch?v=${item.id}`} target="_blank" whileHover={{ y: -5 }} className="group cursor-pointer block">
                                    <div className="aspect-video glass rounded-2xl mb-6 relative overflow-hidden">
                                        <img src={`https://img.youtube.com/vi/${item.id}/hqdefault.jpg`} className="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" alt={item.title} />
                                        <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                            <i data-lucide="play" className="w-10 h-10 fill-current text-white"></i>
                                        </div>
                                    </div>
                                    <span className="text-blue-500 text-[10px] font-bold uppercase tracking-widest mb-2 block">{item.category}</span>
                                    <h3 className="font-bold text-lg group-hover:text-blue-500 transition-colors uppercase leading-tight">{item.title}</h3>
                                </motion.a>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const TikTok = () => {
            const list = [
                { title: 'BigBike Feels Part 3: KTM RC390 2025!', views: '179.7K', url: 'https://www.tiktok.com/@rdft.moto/video/7494789960860454152', img: 'https://p16-common-sign.tiktokcdn.com/tos-alisg-p-0037/oIAGe4GfLAgPCrFzAG6uAJjRTeoIQQAeAg1bvI~tplv-tiktokx-origin.image?dr=14575&x-expires=1777104000&x-signature=xiExvnspdAKmX%2B38rK8JSWVhtrI%3D&t=4d5b0474&ps=13740610&shp=81f88b70&shcp=43f4a2f9&idc=my2' },
                { title: 'Bike Feels Part 15: CF Moto 250 SR 2025!', views: '91.3K', url: 'https://www.tiktok.com/@rdft.moto/video/7497802628684893447', img: 'https://p16-common-sign.tiktokcdn.com/tos-alisg-p-0037/o8gAsEYsoBACFyIkADCMASfDFAvIcQfR5EoCbQ~tplv-tiktokx-origin.image?dr=14575&x-expires=1777104000&x-signature=hantbUm466JIq0OfT58awzsfTFE%3D&t=4d5b0474&ps=13740610&shp=81f88b70&shcp=43f4a2f9&idc=my2' },
                { title: 'The 2025 Honda CBR 150R in #insideracing', views: '73K', url: 'https://www.tiktok.com/@rdft.moto/video/7486085314323303698', img: 'https://p19-common-sign.tiktokcdn.com/tos-alisg-p-0037/osf9jU1ADAEEAsAawCDGoPIjxEAot6r3eF0EDe~tplv-tiktokx-origin.image?dr=14575&x-expires=1777104000&x-signature=dLCWfKeMgQOvOKu6D2LmT%2F%2Bj%2Fzc%3D&t=4d5b0474&ps=13740610&shp=81f88b70&shcp=43f4a2f9&idc=my2' },
                { title: 'Bike Feels Part 16: Cf Moto Lite 250NK!', views: '71.9K', url: 'https://www.tiktok.com/@rdft.moto/video/7498011695030291720', img: 'https://p16-common-sign.tiktokcdn.com/tos-alisg-p-0037/oQERWxQcyAzXACD8CgfiFgAUAnIteAjoBkDokE~tplv-tiktokx-origin.image?dr=14575&x-expires=1777104000&x-signature=i9wG%2B6QtIBXQN8Mr4VFsFadPsrQ%3D&t=4d5b0474&ps=13740610&shp=81f88b70&shcp=43f4a2f9&idc=my2' },
            ];
            return (
                <section id="tiktok" className="py-32 bg-[#0a0a0a] relative overflow-hidden">
                    <div className="container mx-auto px-6">
                        <div className="flex justify-between items-end mb-20">
                            <div>
                                <div className="flex items-center space-x-2 mb-4">
                                    <span className="w-8 h-px bg-cyan-500"></span>
                                    <span className="text-cyan-500 text-[10px] font-black uppercase tracking-widest">Viral Hits</span>
                                </div>
                                <h2 className="text-4xl font-black uppercase tracking-tighter italic">TikTok Highlights</h2>
                            </div>
                            <a href="https://www.tiktok.com/@rdft.moto" target="_blank" className="text-cyan-500 font-bold hover:underline">FOLLOW TIKTOK</a>
                        </div>
                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-6">
                            {list.map((v, i) => (
                                <motion.a key={i} href={v.url} target="_blank" whileHover={{ scale: 1.02 }} className="group relative aspect-[9/16] rounded-3xl overflow-hidden glass border border-white/10">
                                    <img src={v.img} className="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-700 group-hover:opacity-40" />
                                    
                                    {/* Sneak Peek Overlay */}
                                    <div className="absolute inset-0 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-500 translate-y-4 group-hover:translate-y-0">
                                        <div className="w-12 h-12 rounded-full bg-cyan-600/20 backdrop-blur-xl border border-cyan-500/50 flex items-center justify-center mb-4 shadow-[0_0_20px_rgba(6,182,212,0.3)]">
                                            <i data-lucide="play" className="w-5 h-5 text-cyan-400 fill-current"></i>
                                        </div>
                                        <p className="text-[8px] font-black tracking-[0.3em] text-cyan-400 uppercase">Sneak Peek</p>
                                    </div>

                                    <div className="absolute top-4 left-4 z-10 flex items-center space-x-2 bg-black/60 px-3 py-1 rounded-full border border-cyan-500/30">
                                        <span className="w-1.5 h-1.5 bg-cyan-500 rounded-full animate-pulse"></span>
                                        <span className="text-[10px] font-black text-white">{v.views} VIEWS</span>
                                    </div>
                                    <div className="absolute bottom-6 left-6 right-6 z-10">
                                        <p className="text-cyan-500 text-[7px] font-black uppercase tracking-widest mb-1 opacity-0 group-hover:opacity-100 transition-opacity">Watch on TikTok</p>
                                        <h3 className="text-white font-bold text-xs leading-tight uppercase line-clamp-2">{v.title}</h3>
                                    </div>
                                </motion.a>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Gear = () => {
            const gear = [
                { name: 'SEC Cyclone Carbon', tag: 'Helmet', icon: 'shield' },
                { name: 'DJI Action 4', tag: 'Camera', icon: 'camera' },
                { name: 'Freedconn Intercom', tag: 'Audio', icon: 'radio' },
            ];
            return (
                <section id="gear" className="py-32 bg-[#080808] relative">
                    <div className="container mx-auto px-6">
                        <div className="text-center mb-20">
                            <h2 className="text-4xl font-black uppercase tracking-tighter italic">Gear & Tech Stack</h2>
                            <p className="text-gray-500 text-sm mt-3">The tools that power my adventures.</p>
                        </div>
                        <div className="grid md:grid-cols-3 gap-8">
                            {gear.map((g, i) => (
                                <motion.div key={i} whileHover={{ y: -5 }} className="p-10 rounded-[2rem] glass border border-white/5 text-center">
                                    <div className="w-16 h-16 bg-blue-500/10 rounded-2xl flex items-center justify-center mx-auto mb-6">
                                        <i data-lucide={g.icon} className="w-8 h-8 text-blue-500"></i>
                                    </div>
                                    <span className="text-blue-500 text-[10px] font-black tracking-widest uppercase">{g.tag}</span>
                                    <h3 className="text-xl font-bold mt-2">{g.name}</h3>
                                </motion.div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Skills = () => {
            const s = ['Video Editing', 'Motovlogging', 'Cinematography', 'VBA/React', 'Content Strategy', 'Hardware'];
            return (
                <section id="skills" className="py-32 bg-[#0d0d0d]">
                    <div className="container mx-auto px-6 text-center">
                        <h2 className="text-4xl font-black mb-20 uppercase tracking-tighter italic">Skills & Tools</h2>
                        <div className="flex flex-wrap justify-center gap-4">
                            {s.map((skill, i) => (
                                <span key={i} className="px-8 py-4 glass rounded-full font-bold border border-white/5 hover:border-blue-500/50 transition-colors">
                                    {skill}
                                </span>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Contact = () => (
            <section id="contact" className="py-32 bg-[#0a0a0a]">
                <div className="container mx-auto px-6">
                    <div className="max-w-4xl mx-auto glass rounded-[3rem] p-16 text-center">
                        <h2 className="text-5xl font-black mb-8 italic uppercase tracking-tighter">Let's <span className="text-gradient">Collab</span></h2>
                        <p className="text-gray-400 mb-12 text-lg font-light">Have a project in mind or just want to talk bikes? Drop me a message!</p>
                        <form className="space-y-6 max-w-lg mx-auto">
                            <input type="text" placeholder="Your Name" className="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 focus:border-blue-500 focus:outline-none transition-all" />
                            <input type="email" placeholder="Your Email" className="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 focus:border-blue-500 focus:outline-none transition-all" />
                            <textarea rows="4" placeholder="Your Message" className="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 focus:border-blue-500 focus:outline-none transition-all resize-none"></textarea>
                            <button className="w-full bg-blue-600 py-5 rounded-2xl font-bold flex items-center justify-center space-x-3 hover:bg-blue-700 transition-all shadow-xl shadow-blue-600/30">
                                <i data-lucide="send" className="w-5 h-5"></i>
                                <span>SEND MESSAGE</span>
                            </button>
                        </form>
                    </div>
                </div>
            </section>
        );

        const App = () => {
            React.useEffect(() => { lucide.createIcons(); }, []);
            return (
                <div className="bg-[#0a0a0a] min-h-screen text-white">
                    <Navbar />
                    <Hero />
                    <About />
                    <Socials />
                    <Portfolio />
                    <TikTok />
                    <Gear />
                    <Skills />
                    <Contact />
                    <footer className="py-12 bg-[#080808] border-t border-white/5 text-center">
                        <p className="text-gray-600 text-xs tracking-widest">© 2026 RENZ FILART. ALL RIGHTS RESERVED.</p>
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
